name: Keep Backend Alive

on:
  schedule:
    - cron: '*/20 * * * *'   # every 20 minutes
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Ping health endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            https://skintaglabs-skintag.hf.space/api/health)
          echo "Status: $STATUS"
          [ "$STATUS" = "200" ] || exit 1

      # GitHub disables scheduled workflows after 60 days of repo inactivity.
      # This step commits a timestamp every 30 days to keep the schedule alive.
      - uses: actions/checkout@v4
      - name: Refresh activity every 30 days
        run: |
          LAST=$(cat .github/last-ping 2>/dev/null || echo "0")
          NOW=$(date +%s)
          if [ $((NOW - LAST)) -ge $((30 * 24 * 3600)) ]; then
            git config user.email "action@github.com"
            git config user.name "GitHub Action"
            date +%s > .github/last-ping
            git add .github/last-ping
            git commit -m "chore: keep scheduled workflow active"
            git push
          fi
